<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XPert Picks ELITE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; background:#0a0a0a; color:white; font-family:sans-serif; }
.container { max-width:900px; margin:auto; padding:20px; }
.card { background:#111; border:1px solid #222; border-radius:12px; padding:15px; margin-bottom:12px; }
.row { display:flex; justify-content:space-between; align-items:center; }
.btn { padding:10px; border:none; border-radius:8px; cursor:pointer; }
.gold { background:#f59e0b; color:black; }
.badge { padding:6px 10px; border-radius:20px; background:#222; }
.green { color:#4ade80; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const API_KEY = "ee50a545cebd173b766d38fbf6be117";

function impliedProb(odds){
  if (odds > 0) return 100 / (odds + 100);
  return -odds / (-odds + 100);
}

function App(){
  const [games, setGames] = React.useState([]);
  const [slip, setSlip] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState("");

  React.useEffect(() => {
    fetch(`https://api.the-odds-api.com/v4/sports/basketball_nba/odds?apiKey=${API_KEY}&regions=us&markets=h2h`)
      .then(res => {
        if (!res.ok) {
          throw new Error("API request failed");
        }
        return res.json();
      })
      .then(data => {
        const picks = data.map(g => {
          const outcomes = g.bookmakers?.[0]?.markets?.find(m => m.key === "h2h")?.outcomes;
          if (!outcomes) return null;

          const home = outcomes.find(o => o.name === g.home_team);
          const away = outcomes.find(o => o.name === g.away_team);
          if (!home || !away) return null;

          const homeProb = impliedProb(home.price);
          const awayProb = impliedProb(away.price);
          const edge = Math.abs(homeProb - awayProb);
          const pick = homeProb > awayProb ? home.name : away.name;

          return {
            game: `${g.away_team} @ ${g.home_team}`,
            pick,
            edge: (edge * 100).toFixed(1),
            confidence: Math.min(95, Math.max(60, Math.round(edge * 120))),
            reason: "Line imbalance detected from current odds"
          };
        })
        .filter(Boolean)
        .sort((a, b) => b.confidence - a.confidence)
        .slice(0, 5);

        setGames(picks);
        setLoading(false);
      })
      .catch(() => {
        setError("Could not load odds. Check your API key or refresh.");
        setLoading(false);
      });
  }, []);

  function addToSlip(game){
    setSlip(prev => [...prev, game]);
  }

  return (
    <div className="container">
      <h1>XPert Picks ELITE 🔥</h1>

      {loading && <p>Loading picks...</p>}
      {error && <p>{error}</p>}

      {!loading && !error && games.map((g, i) => (
        <div className="card" key={i}>
          <div className="row">
            <div><b>{g.game}</b></div>
            <div className="badge">{g.confidence}%</div>
          </div>

          <div style={{marginTop:10}}>
            PICK: <b>{g.pick}</b>
          </div>

          <div className="green" style={{marginTop:6}}>
            EDGE: {g.edge}%
          </div>

          <div style={{fontSize:12, marginTop:8}}>
            {g.reason}
          </div>

          <button
            className="btn gold"
            style={{marginTop:10}}
            onClick={() => addToSlip(g)}
          >
            Add to Slip
          </button>
        </div>
      ))}

      <h2>Slip ({slip.length})</h2>
      {slip.map((s, i) => (
        <div key={i} style={{marginBottom:8}}>
          {s.pick} — {s.game}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
