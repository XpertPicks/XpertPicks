body{background:radial-gradient(circle at top,#101826 0%,#07080c 55%);color:var(--text);font-family:Inter,sans-serif}
button,a,input,textarea,select{font:inherit}
button{cursor:pointer;outline:none}

.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.24)}

.metric .v{font-size:16px;font-weight:900;line-height:1}
.metric .l{font-size:9px;color:var(--muted);margin-top:4px}
