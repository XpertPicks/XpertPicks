function parseGames(raw,scores,sport){if(!raw?.length)return[];return raw.map(g=>{const sc=scores?.find(x=>x.id===g.id);const live=sc?.completed===false&&sc?.scores!=null;const done=sc?.completed;let sp=null,tot=null,hml=null,aml=null;const bk=g.bookmakers?.find(b=>b.key==="fanduel")||g.bookmakers?.[0];bk?.markets?.forEach(m=>{if(m.key==="spreads"){const h=m.outcomes.find(o=>o.name===g.home_team);if(h)sp=`${h.point>0?"+":""}${h.point}`;}if(m.key==="totals"){const ov=m.outcomes.find(o=>o.name==="Over");if(ov)tot=ov.point;}if(m.key==="h2h"){hml=m.outcomes.find(o=>o.name===g.home_team)?.price;aml=m.outcomes.find(o=>o.name===g.away_team)?.price;}});const aS=sc?.scores?.find(x=>x.name===g.away_team)?.score;const hS=sc?.scores?.find(x=>x.name===g.home_team)?.score;return{id:g.id,sport,away:g.away_team.split(" ").pop(),home:g.home_team.split(" ").pop(),time:live?`🔴 LIVE · ${aS}-${hS}`:done?`Final · ${aS}-${hS}`:new Date(g.commence_time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"}),status:live?"LIVE":done?"FINAL":"UP",sp,tot,hml:fo(hml),aml:fo(aml)};}).filter(g=>g.status!=="FINAL").sort((a,b)=>a.status==="LIVE"?-1:1);}
function parseProps(raw){const pm={};raw.bookmakers?.forEach(bk=>bk.markets?.forEach(mk=>{mk.outcomes?.forEach(o=>{const p=o.description||o.name,d=o.name;if(!pm[p])pm[p]={};if(!pm[p][mk.key])pm[p][mk.key]={ln:o.point,oo:null,uo:null,ob:null,ub:null};const pr=pm[p][mk.key];pr.ln=o.point;if(d==="Over"){if(pr.oo===null||o.price>pr.oo){pr.oo=o.price;pr.ob=bk.title;}}else if(d==="Under"){if(pr.uo===null||o.price>pr.uo){pr.uo=o.price;pr.ub=bk.title;}}});}));const result={};CATS.forEach(cat=>{const players={};cat.keys.forEach(key=>{Object.entries(pm).forEach(([pname,props])=>{if(!props[key])return;const d=props[key];const iO=d.oo!=null?(d.oo<0?Math.abs(d.oo)/(Math.abs(d.oo)+100):100/(d.oo+100)):0.5;const iU=d.uo!=null?(d.uo<0?Math.abs(d.uo)/(Math.abs(d.uo)+100):100/(d.uo+100)):0.5;const pick=iO>=iU?"OVER":"UNDER",conf=Math.round(Math.max(iO,iU)*100);if(!players[pname])players[pname]=[];players[pname].push({id:key,lb:MKT_LABEL[key]||key,ln:d.ln,oo:d.oo,uo:d.uo,ob:d.ob,ub:d.ub,pick,conf});});});if(Object.keys(players).length>0)result[cat.id]={...cat,players};});return result;}
function Photo({name,size=38}){const[err,setErr]=useState(false);const id=NBA_IDS[name];const ini=name.split(" ").map(w=>w[0]).join("").slice(0,2);const base={width:size,height:size,borderRadius:size*0.28,flexShrink:0};if(!id||err)return <div style={{...base,background:`linear-gradient(135deg,${G.go}44,${G.go}11)`,border:`1.5px solid ${G.go}33`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:size*0.36,color:G.go}}>{ini}</div>return <img src={`https://cdn.nba.com/headshots/nba/latest/1040x760/${id}.png`} onError={()=>setErr(true)} style={{...base,objectFit:"cover",objectPosition:"top center",border:`1.5px solid ${G.go}33`,background:G.c3}}/>}

function PropRow({prop,pname,gl,slip,onAdd}){const key=pname+prop.id,e=slip.find(s=>s.key===key),ins=!!e;const cc=prop.conf>=70?G.gr:prop.conf>=63?G.go:G.t2;const add=dir=>onAdd({key,pname,lb:prop.lb,ln:prop.ln,pick:dir,conf:prop.conf,gl,odds:dir==="OVER"?prop.oo:prop.uo});return <div style={{background:ins?G.g2:G.c3,border:`1px solid ${ins?G.go+"66":G.br}`,borderRadius:10,padding:"10px 12px",marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:G.t1,fontSize:13,fontWeight:600}}>{prop.lb}</span>{prop.conf>=68&&<span style={{background:G.g2,color:G.go,border:`1px solid ${G.go}44`,borderRadius:4,padding:"1px 6px",fontSize:8,fontWeight:800}}>🔥 SHARP</span>}</div><span style={{color:cc,fontSize:20,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif"}}>{prop.conf}%</span></div><div style={{display:"flex",gap:6}}><Pill dir="OVER" ln={prop.ln} pick={prop.pick} odds={prop.oo} sel={ins&&e?.pick==="OVER"} onAdd={add}/><Pill dir="UNDER" ln={prop.ln} pick={prop.pick} odds={prop.uo} sel={ins&&e?.pick==="UNDER"} onAdd={add}/></div>{prop.ob&&<div style={{marginTop:5,fontSize:9,color:G.t3}}>Best over: <span style={{color:G.t2}}>{prop.ob}</span> · Best under: <span style={{color:G.t2}}>{prop.ub||"—"}</span></div>}</div>}

function Modal({slip,onClose}){const[cp,setCp]=useState(false);const cpRef=useRef();const txt=slip.map(s=>`${s.pick} ${s.pname} ${s.lb}${s.ln?" "+s.ln:""}`).join("\n");const copy=()=>{try{if(cpRef.current){cpRef.current.value=txt;cpRef.current.select();document.execCommand("copy");}else{navigator.clipboard.writeText(txt);}setCp(true);setTimeout(()=>setCp(false),2200);}catch(e){}};return <div style={{position:"fixed",inset:0,zIndex:999,background:"rgba(0,0,0,.85)",backdropFilter:"blur(10px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}><textarea ref={cpRef} readOnly style={{position:"fixed",left:"-9999px",opacity:0}}/><div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:500,background:G.c1,border:`1px solid ${G.br}`,borderRadius:"18px 18px 0 0",overflow:"hidden"}}><div style={{width:36,height:4,background:G.br,borderRadius:2,margin:"12px auto 16px"}}/><div style={{padding:"0 18px 32px"}}><div style={{color:G.t1,fontWeight:700,fontSize:16,marginBottom:4}}>Send to Sportsbook</div><div style={{color:G.t2,fontSize:12,marginBottom:14}}>Copy your picks then open a platform</div><div style={{background:G.c2,borderRadius:12,border:`1px solid ${G.br}`,marginBottom:14,overflow:"hidden"}}>{slip.map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderBottom:i<slip.length-1?`1px solid ${G.br}`:"none"}}><div><div style={{color:G.t1,fontWeight:600,fontSize:12}}>{s.pname}</div><div style={{color:G.t3,fontSize:10}}>{s.lb}</div></div><span style={{color:s.pick==="OVER"?G.gr:G.re,fontWeight:800,fontSize:13}}>{s.pick} {s.ln}</span></div>)}</div><button onClick={copy} style={{width:"100%",padding:"13px",marginBottom:12,background:cp?G.gr:`linear-gradient(90deg,${G.go},${G.gd})`,borderRadius:11,color:"#000",fontSize:14,fontWeight:800}}>{cp?"✅ Copied!":"📋 Copy Your Picks"}</button><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>{PLAT.map(p=><a key={p.n} href={p.u} target="_blank" rel="noreferrer" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"12px 4px",background:G.c2,border:`1px solid ${G.br}`,borderRadius:11,color:"inherit"}}><div style={{width:30,height:30,borderRadius:7,background:p.c+"22",border:`1px solid ${p.c}55`,display:"flex",alignItems:"center",justifyContent:"center",color:p.c,fontWeight:900,fontSize:9}}>{p.n.slice(0,2).toUpperCase()}</div><span style={{color:G.t2,fontSize:9,fontWeight:600,textAlign:"center"}}>{p.n}</span></a>)}</div><div style={{color:G.t3,fontSize:9,textAlign:"center"}}>⚠️ 21+ only. Verify all lines before betting. Problem gambling? 1-800-GAMBLER</div></div></div></div>}
function App(){const[tab,setTab]=useState("board");const[sport,setSport]=useState("NBA");const[all,setAll]=useState({});const[loading,setLoading]=useState(true);const[err,setErr]=useState(null);const[slip,setSlip]=useState([]);const[modal,setModal]=useState(false);const[updated,setUpdated]=useState(null);const load=useCallback(async()=>{setLoading(true);setErr(null);try{const res={};await Promise.all(Object.entries(SP).map(async([s,c])=>{try{const[g,sc]=await Promise.all([fetchGames(c.k),fetchScores(c.k)]);res[s]=parseGames(g,sc,s);}catch{res[s]=[];}}));setAll(res);setUpdated(new Date());}catch(e){setErr(e.message);}finally{setLoading(false);}},[]); useEffect(()=>{load();const iv=setInterval(load,3*60*1000);return()=>clearInterval(iv);},[]);const addToSlip=item=>setSlip(p=>p.find(s=>s.key===item.key)?p.filter(s=>s.key!==item.key):[...p,item]);const remFromSlip=item=>setSlip(p=>p.filter(s=>s.key!==item.key));const liveCount=Object.values(all).flat().filter(g=>g.status==="LIVE").length;const totalGames=Object.values(all).flat().length;const curGames=all[sport]||[];
return <div style={{background:G.bg,minHeight:"100vh",paddingBottom:72}}><style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}} @keyframes spin{to{transform:rotate(360deg)}} @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}} *{box-sizing:border-box;margin:0;padding:0} button{outline:none;cursor:pointer;font-family:'Syne',sans-serif;border:none} ::-webkit-scrollbar{width:3px;height:3px} ::-webkit-scrollbar-thumb{background:#e8941a44;border-radius:2px}`}</style>
<div style={{background:G.bg,borderBottom:`1px solid ${G.br}`,position:"sticky",top:0,zIndex:300,padding:"0 14px",display:"flex",alignItems:"center",height:54,gap:10}}><div style={{width:34,height:34,borderRadius:9,background:`linear-gradient(135deg,${G.go},${G.gd})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>🐐</div><div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:19,letterSpacing:2,color:G.go,lineHeight:1}}>XPERT PICKS</div><div style={{color:G.t3,fontSize:8,letterSpacing:1}}>PROPS & PARLAYS</div></div><div style={{flex:1}}/>{updated&&<span style={{color:G.t3,fontSize:9}}>{updated.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>}<button onClick={load} style={{background:"none",border:`1px solid ${G.br}`,borderRadius:7,padding:"4px 10px",color:G.t2,fontSize:11}}>{loading?"⚡":"↻"}</button>{liveCount>0&&<div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}><div style={{width:6,height:6,borderRadius:"50%",background:G.go,animation:"pulse 1.5s infinite"}}/><span style={{color:G.go,fontSize:10,fontWeight:700}}>{liveCount} LIVE</span></div>}{slip.length>0&&<div style={{background:G.go,color:"#000",borderRadius:999,padding:"3px 10px",fontSize:11,fontWeight:800,flexShrink:0}}>{slip.length}</div>}</div>
{loading&&!err&&<div style={{textAlign:"center",padding:"80px 20px"}}><div style={{fontSize:38,animation:"spin 1s linear infinite",display:"inline-block",marginBottom:16}}>⚡</div><div style={{color:G.t2,fontSize:14}}>Loading live data...</div></div>}
{err&&<div style={{maxWidth:500,margin:"40px auto",padding:"0 16px"}}><div style={{background:"#ef444415",border:"1px solid #ef444444",borderRadius:12,padding:14,color:G.re,fontSize:12,textAlign:"center"}}>⚠️ {err}<button onClick={load} style={{display:"block",margin:"10px auto 0",background:"none",border:`1px solid ${G.re}`,borderRadius:7,color:G.re,padding:"6px 16px",fontSize:11}}>Retry</button></div></div>}
{!loading&&!err&&<div style={{maxWidth:660,margin:"0 auto",padding:"14px 14px 0"}}>
{tab==="board"&&<><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>{[{lb:"Games",v:totalGames,c:G.go},{lb:"Live",v:liveCount,c:G.gr},{lb:"Sports",v:4,c:"#3b82f6"},{lb:"Slip",v:slip.length,c:G.t1}].map(s=><div key={s.lb} style={{background:G.c1,borderRadius:11,padding:"12px 6px",border:`1px solid ${G.br}`,textAlign:"center"}}><div style={{color:s.c,fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,lineHeight:1}}>{s.v}</div><div style={{color:G.t3,fontSize:9,marginTop:2}}>{s.lb}</div></div>)}</div><LeaderboardTab slip={slip} onAdd={addToSlip}/></>}
{tab==="props"&&<div style={{animation:"fadeIn .2s ease"}}><div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>{Object.entries(SP).map(([s,c])=><button key={s} onClick={()=>setSport(s)} style={{padding:"8px 16px",borderRadius:999,fontSize:12,fontWeight:700,whiteSpace:"nowrap",background:sport===s?G.go:"transparent",border:`1.5px solid ${sport===s?G.go:G.br}`,color:sport===s?"#000":G.t2}}>{c.i} {s} {all[s]?.length?`(${all[s].length})`:""}</button>)}</div>{curGames.length===0?<div style={{color:G.t3,fontSize:13,textAlign:"center",padding:44}}>No {sport} games right now</div>:curGames.map(g=><GameCard key={g.id} g={g} slip={slip} onAdd={addToSlip}/>)}</div>}
{tab==="ai"&&<AIPicksTab slip={slip} onAdd={addToSlip}/>}
{tab==="record"&&<RecordTab/>}
{tab==="slip"&&<SlipTab slip={slip} onRemove={remFromSlip} onSend={()=>slip.length>0&&setModal(true)}/>}
</div>}
<div style={{position:"fixed",bottom:0,left:0,right:0,background:G.c1,borderTop:`1px solid ${G.br}`,display:"flex",zIndex:400,boxShadow:`0 -4px 24px ${G.go}11`}}>{TABS.map(t=>{const act=tab===t.id,badge=t.id==="slip"&&slip.length>0;return <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 2px 13px",background:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>{badge&&<div style={{position:"absolute",top:6,right:"16%",background:G.go,color:"#000",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>{slip.length}</div>}<span style={{fontSize:18}}>{t.i}</span><span style={{fontSize:8,fontWeight:700,color:act?G.go:G.t3,letterSpacing:.5}}>{t.l.toUpperCase()}</span>{act&&<div style={{position:"absolute",top:0,left:"12%",right:"12%",height:2,background:G.go,borderRadius:"0 0 2px 2px"}}/>}</button>})}</div>
{modal&&<Modal slip={slip} onClose={()=>setModal(false)}/>}
</div>}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
