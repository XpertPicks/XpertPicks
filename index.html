<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>XPert Picks Pro</title>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:sans-serif}
.header{padding:16px;font-weight:bold;font-size:20px;border-bottom:1px solid #222}
.card{background:#111;border:1px solid #222;border-radius:12px;padding:12px;margin:10px}
.btn{padding:10px;border-radius:8px;border:none;background:#f59e0b;color:#000;font-weight:bold;cursor:pointer}
.btn.secondary{background:#222;color:#fff}
.row{display:flex;justify-content:space-between;align-items:center}
.small{color:#aaa;font-size:12px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// 🔒 Move API key to config (still frontend, but cleaner)
const CONFIG = {
  API_KEY: ee50a545cebd1713b766d38fb6be117
  BASE: "https://api.the-odds-api.com/v4"
};

// 🔄 Fetch wrapper with error handling
async function fetchJSON(url){
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error("API Error");
    return await res.json();
  }catch(err){
    console.error(err);
    return null;
  }
}

// 🧠 Simple AI confidence mock
function getConfidence(){
  return Math.floor(Math.random()*30)+60;
}

function GameCard({game, onPick}){
  const conf = getConfidence();

  return (
    <div className="card">
      <div className="row">
        <div>
          <div>{game.home_team} vs {game.away_team}</div>
          <div className="small">{new Date(game.commence_time).toLocaleString()}</div>
        </div>
        <div>{conf}%</div>
      </div>

      <div style={{marginTop:10,display:'flex',gap:8}}>
        <button className="btn" onClick={()=>onPick(game,'OVER')}>OVER</button>
        <button className="btn secondary" onClick={()=>onPick(game,'UNDER')}>UNDER</button>
      </div>
    </div>
  );
}

function Slip({slip}){
  return (
    <div className="card">
      <h3>Bet Slip ({slip.length})</h3>
      {slip.map((s,i)=> (
        <div key={i} className="small">{s.pick} - {s.game.home_team}</div>
      ))}
    </div>
  );
}

function App(){
  const [games,setGames] = useState([]);
  const [slip,setSlip] = useState([]);
  const [loading,setLoading] = useState(true);

  useEffect(()=>{
    async function load(){
      const data = await fetchJSON(`${CONFIG.BASE}/sports/basketball_nba/odds?apiKey=${CONFIG.API_KEY}&regions=us`);
      if(data) setGames(data);
      setLoading(false);
    }
    load();
  },[]);

  function addPick(game,pick){
    setSlip(prev=>[...prev,{game,pick}]);
  }

  return (
    <div>
      <div className="header">XPert Picks Pro 🚀</div>

      {loading && <div style={{padding:20}}>Loading...</div>}

      {!loading && games.slice(0,10).map(g=> (
        <GameCard key={g.id} game={g} onPick={addPick}/>
      ))}

      <Slip slip={slip}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
