<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>XPert Picks</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#fff;font-family:'Syne',sans-serif}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
button{outline:none;cursor:pointer}
::-webkit-scrollbar{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;
const K="ee50a545cebd1713b766d38fbf6be117";
const B="https://api.the-odds-api.com/v4";
const G={bg:"#080808",c1:"#111",c2:"#181818",c3:"#222",br:"#2a2a2a",go:"#e8941a",gd:"#c8781a",g1:"#e8941a15",g2:"#e8941a30",gr:"#22c55e",re:"#ef4444",t1:"#fff",t2:"#aaa",t3:"#555"};
const SP={NBA:{k:"basketball_nba",i:"🏀",m:"player_points,player_rebounds,player_assists,player_threes,player_points_rebounds_assists"},NFL:{k:"americanfootball_nfl",i:"🏈",m:"player_pass_yds,player_rush_yds,player_receptions,player_anytime_td"},MLB:{k:"baseball_mlb",i:"⚾",m:"batter_hits,batter_home_runs,pitcher_strikeouts"},NHL:{k:"icehockey_nhl",i:"🏒",m:"player_points,player_goals,player_shots_on_goal"}};
const PL={"player_points":"Pts","player_rebounds":"Reb","player_assists":"Ast","player_threes":"3PM","player_points_rebounds_assists":"PRA","player_pass_yds":"Pass Yds","player_rush_yds":"Rush Yds","player_receptions":"Rec","player_anytime_td":"Anytime TD","batter_hits":"Hits","batter_home_runs":"HR","pitcher_strikeouts":"Ks","player_goals":"Goals","player_shots_on_goal":"Shots"};
const HIST=[{d:"Mar 13",p:"Luka OVER 8.5 Ast",r:"WIN",a:"11"},{d:"Mar 13",p:"Giddey OVER 8.5 Ast",r:"WIN",a:"10"},{d:"Mar 13",p:"Lakers ML",r:"WIN",a:"✓"},{d:"Mar 11",p:"Mitchell OVER 25.5 Pts",r:"WIN",a:"31"},{d:"Mar 11",p:"Sengun OVER 37.5 PRA",r:"WIN",a:"43"},{d:"Mar 10",p:"Edwards OVER 28.5 Pts",r:"WIN",a:"35"},{d:"Mar 10",p:"Brunson OVER 25.5 Pts",r:"LOSS",a:"22"},{d:"Mar 10",p:"Sabonis OVER 13.5 Reb",r:"WIN",a:"16"},{d:"Mar 9",p:"Green OVER 22.5 Pts",r:"WIN",a:"27"},{d:"Mar 9",p:"Wagner OVER 23.5 Pts",r:"LOSS",a:"19"},{d:"Mar 8",p:"Zion OVER 23.5 Pts",r:"WIN",a:"28"},{d:"Mar 8",p:"Harden OVER 8.5 Ast",r:"WIN",a:"11"},{d:"Mar 8",p:"LaMelo OVER 7.5 Ast",r:"LOSS",a:"6"},{d:"Mar 7",p:"Banchero OVER 21.5 Pts",r:"WIN",a:"26"},{d:"Mar 7",p:"Kawhi OVER 21.5 Pts",r:"WIN",a:"24"}];
const PLAT=[{n:"FanDuel",c:"#1a91ff",u:"https://sportsbook.fanduel.com"},{n:"DraftKings",c:"#53d337",u:"https://sportsbook.draftkings.com"},{n:"PrizePicks",c:"#9333ea",u:"https://app.prizepicks.com"},{n:"BetMGM",c:"#d4a843",u:"https://sports.betmgm.com"},{n:"Caesars",c:"#3b82f6",u:"https://sportsbook.caesars.com"},{n:"ESPN Bet",c:"#ef4444",u:"https://espnbet.com"}];
const fo=o=>o?(o>0?`+${o}`:`${o}`):"—";

async function get(url){const r=await fetch(url);if(!r.ok)throw new Error(r.status);return r.json();}
async function games(sk){return get(`${B}/sports/${sk}/odds?apiKey=${K}&regions=us&markets=h2h,spreads,totals&oddsFormat=american`);}
async function scores(sk){return get(`${B}/sports/${sk}/scores?apiKey=${K}&daysFrom=1`).catch(()=>[]);}
async function props(sk,mk,id){return get(`${B}/sports/${sk}/events/${id}/odds?apiKey=${K}&regions=us&markets=${mk}&oddsFormat=american&bookmakers=fanduel,draftkings,betmgm`);}

function parseG(raw,sc,sport){
  if(!raw?.length)return[];
  return raw.map(g=>{
    const s=sc?.find(x=>x.id===g.id),live=s?.completed===false&&s?.scores!=null,done=s?.completed;
    let sp=null,tot=null,hml=null,aml=null;
    const bk=g.bookmakers?.find(b=>b.key==="fanduel")||g.bookmakers?.[0];
    bk?.markets?.forEach(m=>{
      if(m.key==="spreads"){const h=m.outcomes.find(o=>o.name===g.home_team);if(h)sp=`${h.point>0?"+":""}${h.point}`;}
      if(m.key==="totals"){const ov=m.outcomes.find(o=>o.name==="Over");if(ov)tot=ov.point;}
      if(m.key==="h2h"){hml=m.outcomes.find(o=>o.name===g.home_team)?.price;aml=m.outcomes.find(o=>o.name===g.away_team)?.price;}
    });
    const aS=s?.scores?.find(x=>x.name===g.away_team)?.score,hS=s?.scores?.find(x=>x.name===g.home_team)?.score;
    return{id:g.id,sport,away:g.away_team.split(" ").pop(),home:g.home_team.split(" ").pop(),
      time:live?`🔴 LIVE ${aS}-${hS}`:done?`Final ${aS}-${hS}`:new Date(g.commence_time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"}),
      status:live?"LIVE":done?"FINAL":"UP",sp,tot,hml:fo(hml),aml:fo(aml)};
  }).filter(g=>g.status!=="FINAL").sort((a,b)=>a.status==="LIVE"?-1:1);
}

function parseP(raw){
  const pm={};
  raw.bookmakers?.forEach(bk=>bk.markets?.forEach(mk=>{
    if(!PL[mk.key])return;
    mk.outcomes?.forEach(o=>{
      const p=o.description||o.name,d=o.name;
      if(!pm[p])pm[p]={};
      if(!pm[p][mk.key])pm[p][mk.key]={lb:PL[mk.key],ln:o.point,oo:null,uo:null,ob:null,ub:null};
      const pr=pm[p][mk.key];pr.ln=o.point;
      if(d==="Over"){if(pr.oo===null||o.price>pr.oo){pr.oo=o.price;pr.ob=bk.title;}}
      else{if(pr.uo===null||o.price>pr.uo){pr.uo=o.price;pr.ub=bk.title;}}
    });
  }));
  return Object.entries(pm).map(([name,pp])=>({name,props:Object.entries(pp).map(([id,d])=>{
    const iO=d.oo!=null?(d.oo<0?Math.abs(d.oo)/(Math.abs(d.oo)+100):100/(d.oo+100)):0.5;
    const iU=d.uo!=null?(d.uo<0?Math.abs(d.uo)/(Math.abs(d.uo)+100):100/(d.uo+100)):0.5;
    const pick=iO>=iU?"OVER":"UNDER",conf=Math.round(Math.max(iO,iU)*100);
    return{id,lb:d.lb,ln:d.ln,oo:d.oo,uo:d.uo,ob:d.ob,ub:d.ub,pick,conf};
  }).filter(p=>p.ln!=null).sort((a,b)=>b.conf-a.conf)}))
  .filter(p=>p.props.length>0).sort((a,b)=>Math.max(...b.props.map(p=>p.conf))-Math.max(...a.props.map(p=>p.conf)));
}

function Pill({dir,ln,pick,odds,sel,onAdd}){
  const rec=pick===dir,s=sel&&rec;
  return<button onClick={()=>rec&&onAdd(dir)} style={{flex:1,padding:"9px 4px",borderRadius:8,background:s?G.go:rec?G.g2:G.c3,border:`1.5px solid ${s?G.go:rec?G.go+"55":G.br}`,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:rec?"pointer":"default"}}>
    <span style={{fontSize:9,fontWeight:800,color:s?"#000":rec?G.go:G.t3}}>{dir}</span>
    <span style={{fontSize:17,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:s?"#000":rec?G.go:G.t2,lineHeight:1}}>{ln}</span>
    <span style={{fontSize:9,color:s?"#00000077":rec?G.go:G.t3}}>{fo(odds)}</span>
  </button>;
}

function PropRow({prop,pname,gl,slip,onAdd}){
  const key=pname+prop.id,e=slip.find(s=>s.key===key),ins=!!e;
  const cc=prop.conf>=70?G.gr:prop.conf>=63?G.go:G.t2;
  const add=dir=>onAdd({key,pname,lb:prop.lb,ln:prop.ln,pick:dir,conf:prop.conf,gl,odds:dir==="OVER"?prop.oo:prop.uo});
  return<div style={{background:ins?G.g2:G.c2,border:`1px solid ${ins?G.go+"55":G.br}`,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",gap:6}}>
        <span style={{color:G.t1,fontSize:13,fontWeight:600}}>{prop.lb}</span>
        {prop.conf>=68&&<span style={{background:G.g2,color:G.go,border:`1px solid ${G.go}44`,borderRadius:4,padding:"1px 5px",fontSize:8,fontWeight:800}}>🔥 SHARP</span>}
      </div>
      <span style={{color:cc,fontSize:20,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif"}}>{prop.conf}%</span>
    </div>
    <div style={{display:"flex",gap:6}}>
      <Pill dir="OVER" ln={prop.ln} pick={prop.pick} odds={prop.oo} sel={ins&&e?.pick==="OVER"} onAdd={add}/>
      <Pill dir="UNDER" ln={prop.ln} pick={prop.pick} odds={prop.uo} sel={ins&&e?.pick==="UNDER"} onAdd={add}/>
    </div>
  </div>;
}

function PlayerRow({pl,gid,gl,slip,onAdd}){
  const[open,setOpen]=useState(false);
  const ini=pl.name.split(" ").map(w=>w[0]).join("").slice(0,2);
  const best=Math.max(...pl.props.map(p=>p.conf));
  const cc=best>=70?G.gr:best>=63?G.go:G.t2;
  const sc=slip.filter(s=>s.pname===pl.name).length;
  return<div style={{background:G.c1,border:`1px solid ${open?G.go+"44":G.br}`,borderRadius:12,marginBottom:8,overflow:"hidden"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer"}}>
      <div style={{width:36,height:36,borderRadius:9,flexShrink:0,background:`linear-gradient(135deg,${G.go}44,${G.go}11)`,border:`1.5px solid ${G.go}33`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:13,color:G.go}}>{ini}</div>
      <div style={{flex:1}}>
        <div style={{color:G.t1,fontWeight:700,fontSize:14}}>{pl.name}</div>
        <div style={{color:G.t3,fontSize:11}}>{pl.props.length} props</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        {sc>0&&<div style={{background:G.go,color:"#000",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900}}>{sc}</div>}
        <span style={{color:cc,fontWeight:900,fontSize:17,fontFamily:"'Barlow Condensed',sans-serif"}}>{best}%</span>
        <span style={{color:G.t3,fontSize:14,display:"inline-block",transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span>
      </div>
    </div>
    {open&&<div style={{borderTop:`1px solid ${G.br}`,padding:"10px 14px"}}>
      {pl.props.map(p=><PropRow key={p.id} prop={p} pname={pl.name} gl={gl} slip={slip} onAdd={onAdd}/>)}
    </div>}
  </div>;
}

function GameRow({g,slip,onAdd}){
  const[open,setOpen]=useState(false);
  const[pls,setPls]=useState(null);
  const[loading,setLoading]=useState(false);
  const label=`${g.away} @ ${g.home}`;
  const sc=slip.filter(s=>s.gl===label).length;
  const cfg=SP[g.sport];
  const load=async()=>{
    const n=!open;setOpen(n);
    if(n&&!pls&&!loading){setLoading(true);try{const r=await props(cfg.k,cfg.m,g.id);setPls(parseP(r));}catch(e){}finally{setLoading(false);}}
  };
  return<div style={{background:G.c1,border:`1px solid ${g.status==="LIVE"?G.go+"55":open?G.go+"33":G.br}`,borderRadius:14,marginBottom:8,overflow:"hidden"}}>
    {g.status==="LIVE"&&<div style={{background:G.g1,borderBottom:`1px solid ${G.go}33`,padding:"4px 14px",display:"flex",alignItems:"center",gap:6}}><div style={{width:6,height:6,borderRadius:"50%",background:G.go,animation:"pulse 1.5s infinite"}}/><span style={{color:G.go,fontSize:10,fontWeight:800}}>LIVE</span></div>}
    <div onClick={load} style={{padding:"13px 15px",cursor:"pointer"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>{cfg.i}</span>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
            <span style={{color:G.t1,fontWeight:700,fontSize:15}}>{g.away}</span>
            <span style={{color:G.t3}}>@</span>
            <span style={{color:G.t1,fontWeight:700,fontSize:15}}>{g.home}</span>
            {sc>0&&<span style={{background:G.go,color:"#000",borderRadius:999,padding:"1px 7px",fontSize:10,fontWeight:800}}>{sc} picked</span>}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
            <span style={{color:g.status==="LIVE"?G.go:G.t3,fontSize:11}}>{g.time}</span>
            {g.sp&&<span style={{color:G.t3,fontSize:11}}>Spd <span style={{color:G.t2}}>{g.sp}</span></span>}
            {g.tot&&<span style={{color:G.t3,fontSize:11}}>O/U <span style={{color:G.t2}}>{g.tot}</span></span>}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{color:G.t3,fontSize:9}}>ML</div>
          <div style={{color:G.gr,fontSize:11,fontWeight:700}}>{g.hml}</div>
          <div style={{color:G.t2,fontSize:11}}>{g.aml}</div>
        </div>
        <span style={{color:G.t3,fontSize:14,display:"inline-block",transform:open?"rotate(180deg)":"none",transition:"transform .15s",marginLeft:4}}>▾</span>
      </div>
    </div>
    {open&&<div style={{borderTop:`1px solid ${G.br}`,padding:"10px 14px"}}>
      {loading&&<div style={{textAlign:"center",padding:"24px",color:G.go}}><span style={{fontSize:22,display:"inline-block",animation:"spin 1s linear infinite"}}>⚡</span><div style={{color:G.t2,fontSize:12,marginTop:6}}>Loading props...</div></div>}
      {pls&&pls.length===0&&<div style={{color:G.t3,fontSize:12,textAlign:"center",padding:16}}>No props yet — check back at game time</div>}
      {pls&&pls.map(p=><PlayerRow key={p.name} pl={p} gid={g.id} gl={label} slip={slip} onAdd={onAdd}/>)}
    </div>}
  </div>;
}

function Slip({slip,onRemove,onSend}){
  const[cp,setCp]=useState(false);
  const avg=slip.length?Math.round(slip.reduce((a,s)=>a+s.conf,0)/slip.length):0;
  const copy=()=>{navigator.clipboard?.writeText(slip.map(s=>`${s.pick} ${s.pname} ${s.lb} ${s.ln}`).join("\n"));setCp(true);setTimeout(()=>setCp(false),2000);};
  return<div style={{background:G.c1,border:`1px solid ${G.br}`,borderRadius:12,overflow:"hidden"}}>
    <div style={{background:`linear-gradient(90deg,${G.go}22,transparent)`,borderBottom:`1px solid ${G.br}`,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{color:G.t1,fontWeight:700,fontSize:14}}>Bet Slip</span>
        {slip.length>0&&<div style={{background:G.go,color:"#000",borderRadius:"50%",width:20,height:20,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900}}>{slip.length}</div>}
      </div>
      {slip.length>0&&<button onClick={()=>slip.forEach(onRemove)} style={{background:"none",border:"none",color:G.t3,fontSize:11}}>Clear</button>}
    </div>
    {slip.length===0?<div style={{padding:"32px 20px",textAlign:"center"}}>
      <div style={{fontSize:30,marginBottom:10}}>🐐</div>
      <div style={{color:G.t2,fontSize:13,fontWeight:600,marginBottom:4}}>Build your parlay</div>
      <div style={{color:G.t3,fontSize:11}}>Tap OVER or UNDER to add picks</div>
    </div>:<div style={{padding:10}}>
      {slip.map((s,i)=><div key={i} style={{background:G.c2,borderRadius:8,padding:10,marginBottom:6,border:`1px solid ${G.br}`,position:"relative"}}>
        <button onClick={()=>onRemove(s)} style={{position:"absolute",top:8,right:8,background:"none",border:"none",color:G.t3,fontSize:18}}>×</button>
        <div style={{paddingRight:20}}>
          <div style={{color:G.t1,fontWeight:700,fontSize:12,marginBottom:1}}>{s.pname}</div>
          <div style={{color:G.t3,fontSize:10,marginBottom:4}}>{s.lb} · {s.gl}</div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{background:s.pick==="OVER"?"#22c55e15":"#ef444415",color:s.pick==="OVER"?G.gr:G.re,border:`1px solid ${s.pick==="OVER"?G.gr:G.re}44`,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>{s.pick}</span>
            <span style={{color:G.t1,fontWeight:800,fontSize:13}}>{s.ln}</span>
            {s.odds&&<span style={{color:G.t3,fontSize:10}}>({fo(s.odds)})</span>}
            <span style={{color:G.go,fontSize:10,marginLeft:"auto",fontWeight:600}}>{s.conf}%</span>
          </div>
        </div>
      </div>)}
      <div style={{padding:"8px 4px",borderTop:`1px solid ${G.br}`,marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:G.t3,fontSize:11}}>Avg Confidence</span><span style={{color:G.go,fontSize:11,fontWeight:700}}>{avg}%</span></div>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:G.t3,fontSize:11}}>Legs</span><span style={{color:G.t2,fontSize:11,fontWeight:700}}>{slip.length}</span></div>
      </div>
      <button onClick={copy} style={{width:"100%",padding:"9px",marginBottom:6,background:"transparent",border:`1.5px solid ${G.br}`,borderRadius:8,color:G.t2,fontSize:12,fontWeight:600}}>{cp?"✅ Copied!":"📋 Copy Picks"}</button>
      <button onClick={onSend} style={{width:"100%",padding:12,background:`linear-gradient(90deg,${G.go},${G.gd})`,border:"none",borderRadius:8,color:"#000",fontSize:13,fontWeight:800,boxShadow:`0 4px 20px ${G.go}44`}}>📤 Send to Sportsbook</button>
    </div>}
  </div>;
}

function Modal({slip,onClose}){
  const[cp,setCp]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(slip.map(s=>`${s.pick} ${s.pname} ${s.lb} ${s.ln}`).join("\n"));setCp(true);setTimeout(()=>setCp(false),2200);};
  return<div style={{position:"fixed",inset:0,zIndex:999,background:"#000c",backdropFilter:"blur(8px)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,background:G.c1,border:`1px solid ${G.br}`,borderRadius:"16px 16px 0 0",overflow:"hidden"}}>
      <div style={{width:36,height:4,background:G.br,borderRadius:2,margin:"10px auto 14px"}}/>
      <div style={{padding:"0 18px 28px"}}>
        <div style={{color:G.t1,fontWeight:700,fontSize:16,marginBottom:4}}>Send to Sportsbook</div>
        <div style={{color:G.t2,fontSize:12,marginBottom:14}}>Copy picks then open a platform</div>
        <div style={{background:G.c2,borderRadius:10,border:`1px solid ${G.br}`,marginBottom:14,overflow:"hidden"}}>
          {slip.map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderBottom:i<slip.length-1?`1px solid ${G.br}`:"none"}}>
            <div><div style={{color:G.t1,fontWeight:600,fontSize:12}}>{s.pname}</div><div style={{color:G.t3,fontSize:10}}>{s.lb}</div></div>
            <span style={{color:s.pick==="OVER"?G.gr:G.re,fontWeight:800,fontSize:13}}>{s.pick} {s.ln}</span>
          </div>)}
        </div>
        <button onClick={copy} style={{width:"100%",padding:13,marginBottom:12,background:cp?G.gr:`linear-gradient(90deg,${G.go},${G.gd})`,border:"none",borderRadius:10,color:"#000",fontSize:14,fontWeight:800}}>{cp?"✅ Copied!":"📋 Copy Your Picks"}</button>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
          {PLAT.map(p=><a key={p.n} href={p.u} target="_blank" rel="noreferrer" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"10px 4px",background:G.c2,border:`1px solid ${G.br}`,borderRadius:10,textDecoration:"none"}}>
            <div style={{width:28,height:28,borderRadius:6,background:p.c+"22",border:`1px solid ${p.c}55`,display:"flex",alignItems:"center",justifyContent:"center",color:p.c,fontWeight:900,fontSize:8}}>{p.n.slice(0,2).toUpperCase()}</div>
            <span style={{color:G.t2,fontSize:9,fontWeight:600,textAlign:"center"}}>{p.n}</span>
          </a>)}
        </div>
        <div style={{color:G.t3,fontSize:9,textAlign:"center"}}>⚠️ 21+ only. Verify all lines. Problem gambling? 1-800-GAMBLER</div>
      </div>
    </div>
  </div>;
}

const TABS=[{id:"home",i:"🏠",l:"Home"},{id:"props",i:"📊",l:"Props"},{id:"record",i:"📈",l:"Record"},{id:"slip",i:"📋",l:"Slip"}];

function App(){
  const[tab,setTab]=useState("home");
  const[sport,setSport]=useState("NBA");
  const[all,setAll]=useState({});
  const[loading,setLoading]=useState(true);
  const[err,setErr]=useState(null);
  const[slip,setSlip]=useState([]);
  const[modal,setModal]=useState(false);
  const[updated,setUpdated]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true);setErr(null);
    try{
      const res={};
      await Promise.all(Object.entries(SP).map(async([s,c])=>{
        try{const[g,sc]=await Promise.all([games(c.k),scores(c.k)]);res[s]=parseG(g,sc,s);}catch{res[s]=[];}
      }));
      setAll(res);setUpdated(new Date());
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  },[]);

  useEffect(()=>{load();const iv=setInterval(load,180000);return()=>clearInterval(iv);},[]);

  const add=item=>setSlip(p=>p.find(s=>s.key===item.key)?p.filter(s=>s.key!==item.key):[...p,item]);
  const rem=item=>setSlip(p=>p.filter(s=>s.key!==item.key));
  const live=Object.values(all).flat().filter(g=>g.status==="LIVE").length;
  const total=Object.values(all).flat().length;
  const cur=all[sport]||[];
  const wins=HIST.filter(h=>h.r==="WIN").length;
  const pct=Math.round(wins/HIST.length*100);

  return<div style={{background:G.bg,minHeight:"100vh",paddingBottom:70}}>
    {/* TOP BAR */}
    <div style={{background:G.bg,borderBottom:`1px solid ${G.br}`,position:"sticky",top:0,zIndex:300,padding:"0 14px",display:"flex",alignItems:"center",height:52,gap:10}}>
      <div style={{width:32,height:32,borderRadius:8,background:`linear-gradient(135deg,${G.go},${G.gd})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🐐</div>
      <div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,letterSpacing:2,color:G.go,lineHeight:1}}>XPERT PICKS</div>
        <div style={{color:G.t3,fontSize:8,letterSpacing:1}}>PROPS & PARLAYS</div>
      </div>
      <div style={{flex:1}}/>
      {updated&&<span style={{color:G.t3,fontSize:9}}>{updated.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>}
      <button onClick={load} style={{background:"none",border:`1px solid ${G.br}`,borderRadius:6,padding:"4px 10px",color:G.t2,fontSize:11,fontFamily:"'Syne',sans-serif"}}>{loading?"⚡":"↻"}</button>
      {live>0&&<div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:G.go,animation:"pulse 1.5s infinite"}}/><span style={{color:G.go,fontSize:10,fontWeight:700}}>{live} LIVE</span></div>}
    </div>

    <div style={{maxWidth:600,margin:"0 auto",padding:"14px 14px 0"}}>

    {/* LOADING */}
    {loading&&!err&&<div style={{textAlign:"center",padding:"80px 20px"}}>
      <div style={{fontSize:36,animation:"spin 1s linear infinite",display:"inline-block",marginBottom:16}}>⚡</div>
      <div style={{color:G.t2,fontSize:14}}>Loading live data...</div>
    </div>}

    {/* ERROR */}
    {err&&<div style={{background:"#ef444415",border:"1px solid #ef444444",borderRadius:10,padding:14,color:G.re,fontSize:12,textAlign:"center",margin:"40px 0"}}>
      ⚠️ {err}<button onClick={load} style={{display:"block",margin:"10px auto 0",background:"none",border:`1px solid ${G.re}`,borderRadius:6,color:G.re,padding:"6px 16px",fontSize:11}}>Retry</button>
    </div>}

    {!loading&&!err&&<>

    {/* HOME */}
    {tab==="home"&&<div>
      <div style={{background:`linear-gradient(135deg,${G.c1},${G.c2})`,border:`2px solid ${G.go}44`,borderRadius:16,padding:16,marginBottom:14}}>
        <div style={{color:G.go,fontSize:11,fontWeight:700,letterSpacing:2,marginBottom:6}}>TODAY · {new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase()}</div>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:26,lineHeight:1.1,marginBottom:8}}>
          High Hit-Rate<br/><span style={{color:G.go}}>Props</span> & Parlays 🐐
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setTab("props")} style={{padding:"10px 18px",background:`linear-gradient(90deg,${G.go},${G.gd})`,border:"none",borderRadius:8,color:"#000",fontWeight:800,fontSize:13,fontFamily:"'Syne',sans-serif"}}>Browse Props</button>
          <button onClick={()=>setTab("record")} style={{padding:"10px 18px",background:"transparent",border:`1.5px solid ${G.go}`,borderRadius:8,color:G.go,fontWeight:700,fontSize:13,fontFamily:"'Syne',sans-serif"}}>📈 Record</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
        {[{l:"Games",v:total,c:G.go},{l:"Live",v:live,c:G.gr},{l:"Sports",v:4,c:"#3b82f6"},{l:"Slip",v:slip.length,c:G.t1}].map(s=><div key={s.l} style={{background:G.c1,borderRadius:10,padding:"12px 6px",border:`1px solid ${G.br}`,textAlign:"center"}}>
          <div style={{color:s.c,fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,lineHeight:1}}>{s.v}</div>
          <div style={{color:G.t3,fontSize:9,marginTop:2}}>{s.l}</div>
        </div>)}
      </div>
      {Object.entries(SP).map(([s,c])=>{
        const gs=all[s]||[];if(!gs.length)return null;
        return<div key={s} style={{marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:16}}>{c.i}</span>
            <span style={{color:G.t1,fontWeight:700,fontSize:14}}>{s}</span>
            <span style={{color:G.t3,fontSize:11}}>{gs.length} games</span>
          </div>
          {gs.map(g=><div key={g.id} onClick={()=>{setSport(s);setTab("props");}} style={{background:g.status==="LIVE"?`linear-gradient(90deg,${G.g1},${G.c1})`:G.c1,border:`1px solid ${g.status==="LIVE"?G.go+"55":G.br}`,borderRadius:10,padding:"11px 14px",marginBottom:6,cursor:"pointer",display:"flex",alignItems:"center",gap:10}}>
            {g.status==="LIVE"&&<div style={{width:6,height:6,borderRadius:"50%",background:G.go,animation:"pulse 1.5s infinite",flexShrink:0}}/>}
            <div style={{flex:1}}>
              <div style={{color:G.t1,fontWeight:700,fontSize:13}}>{g.away} @ {g.home}</div>
              <div style={{color:g.status==="LIVE"?G.go:G.t3,fontSize:11,marginTop:2}}>{g.time}{g.tot?` · O/U ${g.tot}`:""}</div>
            </div>
            <span style={{color:G.t3}}>→</span>
          </div>)}
        </div>;
      })}
    </div>}

    {/* PROPS */}
    {tab==="props"&&<div>
      <div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>
        {Object.entries(SP).map(([s,c])=><button key={s} onClick={()=>setSport(s)} style={{padding:"7px 14px",borderRadius:999,fontSize:12,fontWeight:700,whiteSpace:"nowrap",background:sport===s?G.go:"transparent",border:`1.5px solid ${sport===s?G.go:G.br}`,color:sport===s?"#000":G.t2,transition:"all .12s"}}>
          {c.i} {s} {all[s]?.length?`(${all[s].length})`:""}
        </button>)}
      </div>
      {cur.length===0?<div style={{color:G.t3,fontSize:13,textAlign:"center",padding:40}}>No {sport} games today</div>:cur.map(g=><GameRow key={g.id} g={g} slip={slip} onAdd={add}/>)}
    </div>}

    {/* RECORD */}
    {tab==="record"&&<div>
      <div style={{background:G.c1,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${G.br}`}}>
        <div style={{color:G.go,fontWeight:800,fontSize:12,letterSpacing:1,marginBottom:12}}>📊 TRACK RECORD — LAST 30 DAYS</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
          {[{l:"Hit Rate",v:`${pct}%`,c:pct>=70?G.gr:G.go},{l:"Wins",v:wins,c:G.gr},{l:"Losses",v:HIST.length-wins,c:G.re},{l:"Total",v:HIST.length,c:G.t1}].map(s=><div key={s.l} style={{textAlign:"center",background:G.c2,borderRadius:10,padding:"10px 4px",border:`1px solid ${G.br}`}}>
            <div style={{color:s.c,fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,lineHeight:1}}>{s.v}</div>
            <div style={{color:G.t3,fontSize:9,marginTop:2}}>{s.l}</div>
          </div>)}
        </div>
        <div style={{height:8,background:G.c3,borderRadius:4,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${G.go},${G.gr})`,borderRadius:4}}/>
        </div>
      </div>
      {HIST.map((h,i)=><div key={i} style={{background:G.c1,borderRadius:10,padding:"11px 14px",marginBottom:6,border:`1px solid ${h.r==="WIN"?G.gr+"33":G.re+"33"}`,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:16}}>{h.r==="WIN"?"✅":"❌"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:G.t1,fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.p}</div>
          <div style={{color:G.t3,fontSize:10,marginTop:2}}>{h.d} · Result: <span style={{color:G.t2}}>{h.a}</span></div>
        </div>
        <span style={{color:h.r==="WIN"?G.gr:G.re,fontWeight:800,fontSize:12,flexShrink:0}}>{h.r}</span>
      </div>)}
    </div>}

    {/* SLIP */}
    {tab==="slip"&&<Slip slip={slip} onRemove={rem} onSend={()=>slip.length>0&&setModal(true)}/>}

    </>}
    </div>

    {/* BOTTOM NAV */}
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:G.c1,borderTop:`1px solid ${G.br}`,display:"flex",zIndex:400}}>
      {TABS.map(t=>{
        const act=tab===t.id,badge=t.id==="slip"&&slip.length>0;
        return<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 2px 12px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
          {badge&&<div style={{position:"absolute",top:6,right:"18%",background:G.go,color:"#000",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>{slip.length}</div>}
          <span style={{fontSize:17}}>{t.i}</span>
          <span style={{fontSize:8,fontWeight:700,color:act?G.go:G.t3}}>{t.l.toUpperCase()}</span>
          {act&&<div style={{position:"absolute",top:0,left:"15%",right:"15%",height:2,background:G.go,borderRadius:"0 0 2px 2px"}}/>}
        </button>;
      })}
    </div>

    {modal&&<Modal slip={slip} onClose={()=>setModal(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
