async function getGames(sk){
try{
const r=await fetch(BASE+”/sports/”+sk+”/odds?apiKey=”+K+”&regions=us&markets=h2h,spreads,totals&oddsFormat=american”);
const d=await r.json();
const sc=await fetch(BASE+”/sports/”+sk+”/scores?apiKey=”+K+”&daysFrom=1”).then(r=>r.json()).catch(()=>[]);
return(d||[]).map(g=>{
const s=sc.find(x=>x.id===g.id),live=s?.completed===false&&s?.scores!=null,done=s?.completed;
let sp=null,tot=null,hml=null,aml=null;
const bk=g.bookmakers?.find(b=>b.key===“fanduel”)||g.bookmakers?.[0];
bk?.markets?.forEach(m=>{
if(m.key===“spreads”){const h=m.outcomes.find(o=>o.name===g.home_team);if(h)sp=(h.point>0?”+”:””)+h.point;}
if(m.key===“totals”){const ov=m.outcomes.find(o=>o.name===“Over”);if(ov)tot=ov.point;}
if(m.key===“h2h”){hml=m.outcomes.find(o=>o.name===g.home_team)?.price;aml=m.outcomes.find(o=>o.name===g.away_team)?.price;}
});
const aS=s?.scores?.find(x=>x.name===g.away_team)?.score,hS=s?.scores?.find(x=>x.name===g.home_team)?.score;
return{id:g.id,sport:sk,away:g.away_team.split(” “).pop(),home:g.home_team.split(” “).pop(),
time:live?“LIVE “+aS+”-”+hS:done?“Final “+aS+”-”+hS:new Date(g.commence_time).toLocaleTimeString(“en-US”,{hour:“numeric”,minute:“2-digit”,timeZoneName:“short”}),
status:live?“LIVE”:done?“FINAL”:“UP”,sp,tot,hml:fo(hml),aml:fo(aml)};
}).filter(g=>g.status!==“FINAL”).sort((a,b)=>a.status===“LIVE”?-1:1);
}catch(e){return[];}
}

</div>;})}
</div>}{tab===“record”&&<div>

{[5,10,20,25].map(r=><button key={r} onClick={()=>setRange(r)} style={{padding:"6px 14px",borderRadius:999,fontSize:11,fontWeight:700,whiteSpace:"nowrap",background:range===r?"#e8941a":"transparent",border:"1.5px solid "+(range===r?"#e8941a":"#2a2a2a"),color:range===r?"#000":"#aaa"}}>L{r}</button>)}
</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6,marginBottom:10}}>
{[{lb:"Hit Rate",v:hp+"%",c:hp>=70?"#22c55e":"#e8941a"},{lb:"Wins",v:wins,c:"#22c55e"},{lb:"Losses",v:hist.length-wins,c:"#ef4444"},{lb:"Total",v:hist.length,c:"#fff"}].map(s=><div key={s.lb} style={{textAlign:"center",background:"#161616",borderRadius:8,padding:"8px 4px",border:"1px solid #2a2a2a"}}><div style={{color:s.c,fontSize:20,fontWeight:900,lineHeight:1}}>{s.v}</div><div style={{color:"#555",fontSize:8,marginTop:2}}>{s.lb}</div></div>)}

<div style={{height:8,background:"#252525",borderRadius:4,overflow:"hidden"}}><div style={{width:hp+"%",height:"100%",background:"linear-gradient(90deg,#e8941a,#22c55e)",borderRadius:4}}/></div>

<div style={{display:"flex",gap:5,marginBottom:10,overflowX:"auto"}}>
{["All","Points","Rebounds","Assists","PRA","3PM","ML"].map(c=><button key={c} onClick={()=>setRcat(c)} style={{padding:"5px 12px",borderRadius:999,fontSize:10,fontWeight:700,whiteSpace:"nowrap",background:rcat===c?"#e8941a":"transparent",border:"1px solid "+(rcat===c?"#e8941a":"#2a2a2a"),color:rcat===c?"#000":"#aaa"}}>{c}</button>)}
</div>
{hist.map((h,i)=><div key={i} style={{background:"#0f0f0f",borderRadius:10,padding:"10px 14px",marginBottom:6,border:"1px solid "+(h.r==="WIN"?"#22c55e33":"#ef444433"),display:"flex",alignItems:"center",gap:10}}>

<div style={{flex:1,minWidth:0}}><div style={{color:"#fff",fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{h.p}</div><div style={{color:"#555",fontSize:10}}>{h.d} · {h.a}</div></div>

{slip.length>0&&<button onClick={()=>slip.forEach(rem)} style={{background:"none",border:"none",color:"#555",fontSize:11}}>Clear all</button>}

{slip.map((s,i)=><div key={i} style={{background:"#161616",borderRadius:8,padding:10,marginBottom:6,border:"1px solid #2a2a2a",position:"relative"}}>

<div style={{paddingRight:24}}><div style={{color:"#fff",fontWeight:700,fontSize:12}}>{s.pname}</div><div style={{color:"#555",fontSize:10,marginBottom:4}}>{s.lb}</div>
<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{background:s.pick==="OVER"?"#22c55e15":"#ef444415",color:s.pick==="OVER"?"#22c55e":"#ef4444",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:700}}>{s.pick}</span>{s.ln&&<span style={{color:"#fff",fontWeight:800,fontSize:13}}>{s.ln}</span>}<span style={{color:"#e8941a",fontSize:10,marginLeft:"auto",fontWeight:600}}>{s.conf}%</span></div>
</div></div>)}
<div style={{padding:"8px 4px",borderTop:"1px solid #2a2a2a",marginBottom:8}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:"#555",fontSize:11}}>Avg Confidence</span><span style={{color:"#e8941a",fontWeight:700,fontSize:11}}>{avg}%</span></div>
<div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#555",fontSize:11}}>Legs</span><span style={{color:"#aaa",fontWeight:700,fontSize:11}}>{slip.length}</span></div>
</div>

</div>}
</div>}</div><div style={{position:"fixed",bottom:0,left:0,right:0,background:"#0f0f0f",borderTop:"1px solid #2a2a2a",display:"flex",zIndex:400}}>

<span style={{fontSize:17}}>{t.i}</span>
<span style={{fontSize:7,fontWeight:700,color:act?"#e8941a":"#555"}}>{t.l.toUpperCase()}</span>

</button>;})}
</div>{modal&&<div style={{position:“fixed”,inset:0,zIndex:999,background:“rgba(0,0,0,.85)”,display:“flex”,alignItems:“flex-end”,justifyContent:“center”}} onClick={()=>setModal(false)}>
<div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:480,background:"#0f0f0f",border:"1px solid #2a2a2a",borderRadius:"16px 16px 0 0",overflow:"hidden"}}>
<div style={{width:36,height:4,background:"#2a2a2a",borderRadius:2,margin:"10px auto 14px"}}/>

<div style={{width:28,height:28,borderRadius:6,background:p.c+"22",display:"flex",alignItems:"center",justifyContent:"center",color:p.c,fontWeight:900,fontSize:8}}>{p.n.slice(0,2).toUpperCase()}</div>

</a>)}
</div>
<div style={{color:"#555",fontSize:9,textAlign:"center"}}>21+ only. Verify all lines. 1-800-GAMBLER</div>
</div>
</div>
</div>}
</div>;
