async function apiFetch(url){const r=await fetch(url);if(!r.ok)throw new Error(r.status===401?"Invalid API key":"Error "+r.status);return r.json();}
async function fetchGames(sk){return apiFetch(`${BASE}/sports/${sk}/odds?apiKey=${K}&regions=us&markets=h2h,spreads,totals&oddsFormat=american`);}

async function fetchProps(sk,id){return apiFetch(`${BASE}/sports/${sk}/events/${id}/odds?apiKey=${K}&regions=us&markets=${ALL_MKT}&oddsFormat=american&bookmakers=fanduel,draftkings,betmgm`);}
function parseGames(raw,scores,sport){if(!raw?.length)return[];return raw.map(g=>{const sc=scores?.find(x=>x.id===g.id),live=sc?.completed===false&&sc?.scores!=null,done=sc?.completed;let sp=null,tot=null,hml=null,aml=null;const bk=g.bookmakers?.find(b=>b.key==="fanduel")||g.bookmakers?.[0];bk?.markets?.forEach(m=>{if(m.key==="spreads"){const h=m.outcomes.find(o=>o.name===g.home_team);if(h)sp=`${h.point>0?"+":""}${h.point}`;}if(m.key==="totals"){const ov=m.outcomes.find(o=>o.name==="Over");if(ov)tot=ov.point;}if(m.key==="h2h"){hml=m.outcomes.find(o=>o.name===g.home_team)?.price;aml=m.outcomes.find(o=>o.name===g.away_team)?.price;}});const aS=sc?.scores?.find(x=>x.name===g.away_team)?.score,hS=sc?.scores?.find(x=>x.name===g.home_team)?.score;return{id:g.id,sport,away:g.away_team.split(" ").pop(),home:g.home_team.split(" ").pop(),time:live?`🔴 LIVE · ${aS}-${hS}`:done?`Final · ${aS}-${hS}`:new Date(g.commence_time).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"}),status:live?"LIVE":done?"FINAL":"UP",sp,tot,hml:fo(hml),aml:fo(aml)};}).filter(g=>g.status!=="FINAL").sort((a,b)=>a.status==="LIVE"?-1:1);}
function parseProps(raw){const pm={};raw.bookmakers?.forEach(bk=>bk.markets?.forEach(mk=>{mk.outcomes?.forEach(o=>{const p=o.description||o.name,d=o.name;if(!pm[p])pm[p]={};if(!pm[p][mk.key])pm[p][mk.key]={ln:o.point,oo:null,uo:null,ob:null,ub:null};const pr=pm[p][mk.key];pr.ln=o.point;if(d==="Over"){if(pr.oo===null||o.price>pr.oo){pr.oo=o.price;pr.ob=bk.title;}}else if(d==="Under"){if(pr.uo===null||o.price>pr.uo){pr.uo=o.price;pr.ub=bk.title;}}});}));const result={};CATS.forEach(cat=>{const players={};cat.keys.forEach(key=>{Object.entries(pm).forEach(([pname,props])=>{if(!props[key])return;const d=props[key];const iO=d.oo!=null?(d.oo<0?Math.abs(d.oo)/(Math.abs(d.oo)+100):100/(d.oo+100)):0.5;const iU=d.uo!=null?(d.uo<0?Math.abs(d.uo)/(Math.abs(d.uo)+100):100/(d.uo+100)):0.5;const pick=iO>=iU?"OVER":"UNDER",conf=Math.round(Math.max(iO,iU)*100);if(!players[pname])players[pname]=[];players[pname].push({id:key,lb:MKTLABEL[key]||key,ln:d.ln,oo:d.oo,uo:d.uo,ob:d.ob,ub:d.ub,pick,conf});});});if(Object.keys(players).length>0)result[cat.id]={...cat,players};});return result;}
function genAI(name,prop,pick,line,conf){const dirs={OVER:["has been smashing this line recently","is trending well above this number","the sharp money is on the over here","books keep moving this line up — still value"],UNDER:["is being limited by this matchup","opponent ranks top 5 defending this category","line is inflated — under is the sharp play","expect a down game in this spot"]};const dir=dirs[pick][Math.floor(Math.random()*4)];const lvl=conf>=70?"🔥 HIGH CONFIDENCE":conf>=63?"⚡ MEDIUM CONFIDENCE":"📊 STANDARD PICK";return `${lvl}\n\n${name} ${pick} ${line} ${prop} at ${conf}%.\n\n${name} ${dir}. Line movement favors this side with ${conf>=68?"multiple books agreeing on value":"FanDuel showing the best number"}. ${conf>=70?"Back this aggressively.":"Solid play with controlled sizing."}`;}
function Photo({name,size=38}){const[err,setErr]=useState(false);const photo=nbaPhoto(name);const ini=name.split(" ").map(w=>w[0]).join("").slice(0,2);if(!photo||err)return <div style={{width:size,height:size,borderRadius:size*0.28,flexShrink:0,background:`linear-gradient(135deg,${G.go}44,${G.go}11)`,border:`1.5px solid ${G.go}33`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:size*0.36,color:G.go}}>{ini}</div>;return <img src={photo} onError={()=>setErr(true)} style={{width:size,height:size,borderRadius:size*0.28,objectFit:"cover",objectPosition:"top center",flexShrink:0,border:`1.5px solid ${G.go}33`,background:G.c3}}/>;}
function Pill({dir,ln,pick,odds,sel,onAdd}){const rec=pick===dir,s=sel&&rec;return <button onClick={()=>rec&&onAdd(dir)} style={{flex:1,padding:"9px 4px",borderRadius:8,background:s?G.go:rec?G.g2:G.c4,border:`1.5px solid ${s?G.go:rec?G.go+"55":G.br}`,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:rec?"pointer":"default"}}><span style={{fontSize:9,fontWeight:800,color:s?"#000":rec?G.go:G.t3}}>{dir}</span><span style={{fontSize:17,fontWeight:900,color:s?"#000":rec?G.go:G.t2,lineHeight:1}}>{ln??"-"}</span><span style={{fontSize:9,color:s?"#00000077":rec?G.go:G.t3}}>{fo(odds)}</span></button>;}
function PropRow({prop,pname,gl,slip,onAdd}){const key=pname+prop.id,e=slip.find(s=>s.key===key),ins=!!e;const cc=prop.conf>=70?G.gr:prop.conf>=63?G.go:G.t2;const add=dir=>onAdd({key,pname,lb:prop.lb,ln:prop.ln,pick:dir,conf:prop.conf,gl,odds:dir==="OVER"?prop.oo:prop.uo});return <div style={{background:ins?G.g2:G.c3,border:`1px solid ${ins?G.go+"55":G.br}`,borderRadius:10,padding:"10px 12px",marginBottom:6}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:G.t1,fontSize:13,fontWeight:600}}>{prop.lb}</span>{prop.conf>=68&&<span style={{background:G.g2,color:G.go,border:`1px solid ${G.go}44`,borderRadius:4,padding:"1px 5px",fontSize:8,fontWeight:800}}>🔥 SHARP</span>}</div><span style={{color:cc,fontSize:20,fontWeight:900}}>{prop.conf}%</span></div><div style={{display:"flex",gap:6}}><Pill dir="OVER" ln={prop.ln} pick={prop.pick} odds={prop.oo} sel={ins&&e?.pick==="OVER"} onAdd={add}/><Pill dir="UNDER" ln={prop.ln} pick={prop.pick} odds={prop.uo} sel={ins&&e?.pick==="UNDER"} onAdd={add}/></div></div>;}
function PlayerInCat({pname,props,gl,slip,onAdd}){const[open,setOpen]=useState(false);const best=Math.max(...props.map(p=>p.conf));const cc=best>=70?G.gr:best>=63?G.go:G.t2;const sc=slip.filter(s=>s.pname===pname&&s.gl===gl).length;return <div style={{borderBottom:`1px solid ${G.br}`}}><div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer"}}><Photo name={pname} size={34}/><div style={{flex:1,minWidth:0}}><div style={{color:G.t1,fontWeight:700,fontSize:13}}>{pname}</div><div style={{color:G.t3,fontSize:10}}>{props.length} props</div></div>{sc>0&&<div style={{background:G.go,color:"#000",borderRadius:"50%",width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>{sc}</div>}<span style={{color:cc,fontWeight:900,fontSize:16}}>{best}%</span><span style={{color:G.t3,fontSize:13,transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span></div>{open&&<div style={{padding:"6px 14px 12px"}}>{props.map(p=><PropRow key={p.id} prop={p} pname={pname} gl={gl} slip={slip} onAdd={onAdd}/>)}</div>}</div>;}
function CatSection({cat,gl,slip,onAdd}){const[open,setOpen]=useState(false);const players=Object.entries(cat.players||{});if(!players.length)return null;return <div style={{borderBottom:`1px solid ${G.br}`}}><div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",background:open?G.g1:"transparent"}}><span style={{fontSize:15}}>{cat.i}</span><span style={{color:G.t1,fontWeight:600,fontSize:13,flex:1}}>{cat.lb}</span><span style={{color:G.t3,fontSize:11,marginRight:6}}>{players.length} players</span><span style={{color:G.t3,fontSize:13,transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span></div>{open&&<div style={{background:G.c1}}>{players.sort((a,b)=>Math.max(...b[1].map(p=>p.conf))-Math.max(...a[1].map(p=>p.conf))).map(([pname,props])=><PlayerInCat key={pname} pname={pname} props={props} gl={gl} slip={slip} onAdd={onAdd}/>)}</div>}</div>;}

3,fontSize:9}}>{updated.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>}<button onClick={load} style={{background:"none",border:`1px solid ${G.br}`,borderRadius:6,padding:"4px 10px",color:G.t2,fontSize:11}}>{loading?"...":"↻"}</button>{live>0&&<div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:6,height:6,borderRadius:"50%",background:G.go,animation:"pulse 1.5s infinite"}}/><span style={{color:G.go,fontSize:10,fontWeight:700}}>{live} LIVE</span></div>}</div><div style={{maxWidth:600,margin:"0 auto",padding:"14px 14px 0"}}>{loading&&!err&&<div style={{textAlign:"center",padding:"80px 20px"}}><div style={{fontSize:36,animation:"spin 1s linear infinite",display:"inline-block",marginBottom:16}}>⚡</div><div style={{color:G.t2,fontSize:14}}>Loading live data...</div></div>}{err&&<div style={{background:"#ef444415",border:"1px solid #ef444444",borderRadius:10,padding:14,color:G.re,fontSize:12,textAlign:"center",margin:"40px 0"}}>Error: {err}<button onClick={load} style={{display:"block",margin:"10px auto 0",background:"none",border:`1px solid ${G.re}`,borderRadius:6,color:G.re,padding:"6px 16px",fontSize:11}}>Retry</button></div>}{!loading&&!err&&<>{tab==="board"&&<LeaderboardTab slip={slip} onAdd={add}/>}{tab==="props"&&<div><div style={{display:"flex",gap:6,marginBottom:12,overflowX:"auto",paddingBottom:4}}>{Object.entries(SP).map(([s,c])=><button key={s} onClick={()=>setSport(s)} style={{padding:"7px 14px",borderRadius:999,fontSize:12,fontWeight:700,whiteSpace:"nowrap",background:sport===s?G.go:"transparent",border:`1.5px solid ${sport===s?G.go:G.br}`,color:sport===s?"#000":G.t2}}>{c.i} {s} {all[s]?.length?`(${all[s].length})`:""}</button>)}</div>{(all[sport]||[]).length===0?<div style={{color:G.t3,fontSize:13,textAlign:"center",padding:40}}>No {sport} games today</div>:(all[sport]||[]).map(g=><GameCard key={g.id} g={g} slip={slip} onAdd={add}/>)}</div>}{tab==="ai"&&<AIPicksTab slip={slip} onAdd={add}/>}{tab==="record"&&<RecordTab/>}{tab==="slip"&&<SlipTab slip={slip} onRemove={rem} onSend={()=>slip.length>0&&setModal(true)}/>}</>;}</div><div style={{position:"fixed",bottom:0,left:0,right:0,background:G.c1,borderTop:`1px solid ${G.br}`,display:"flex",zIndex:400}}>{TABS.map(t=>{const act=tab===t.id,badge=t.id==="slip"&&slip.length>0;return <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 2px 12px",background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>{badge&&<div style={{position:"absolute",top:6,right:"14%",background:G.go,color:"#000",borderRadius:"50%",width:16,height:16,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900}}>{slip.length}</div>}<span style={{fontSize:17}}>{t.i}</span><span style={{fontSize:7,fontWeight:700,color:act?G.go:G.t3}}>{t.l.toUpperCase()}</span>{act&&<div style={{position:"absolute",top:0,left:"10%",right:"10%",height:2,background:G.go,borderRadius:"0 0 2px 2px"}}/>}</button>;})}</div>{modal&&<Modal slip={slip} onClose={()=>setModal(false)}/>}</div>;}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
