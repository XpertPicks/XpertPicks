<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPert Picks Pro</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0b0b0b, #040404);
      color: white;
    }
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 90px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(8, 8, 8, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #222;
      margin: 0 -16px 18px;
      padding: 14px 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .brand-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f59e0b, #ffd166);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }
    .sub {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .pill {
      background: #151515;
      border: 1px solid #2b2b2b;
      color: #ddd;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
    }
    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .statbox, .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }
    .statbox {
      padding: 14px;
      text-align: center;
    }
    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }
    .stat-label {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .sports, .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-family: inherit;
    }
    .btn {
      padding: 10px 14px;
      border-radius: 12px;
      background: #171717;
      color: white;
      border: 1px solid #2a2a2a;
    }
    .btn.active, .btn.gold {
      background: linear-gradient(135deg, #f59e0b, #ffd166);
      color: #111;
      border-color: #f59e0b;
    }
    .search {
      flex: 1;
      min-width: 220px;
      max-width: 360px;
      background: #101010;
      color: white;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .card {
      padding: 16px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .player {
      font-size: 20px;
      font-weight: 800;
    }
    .meta {
      color: #9f9f9f;
      font-size: 13px;
      margin-top: 4px;
    }
    .conf {
      min-width: 72px;
      text-align: center;
      padding: 9px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
    }
    .conf.high { color: #7CFFB2; border-color: rgba(124,255,178,0.25); background: rgba(34,197,94,0.1); }
    .conf.mid { color: #ffd166; border-color: rgba(255,209,102,0.25); background: rgba(245,158,11,0.1); }
    .pickbox {
      margin-top: 14px;
      background: #171717;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 14px;
    }
    .picklabel {
      font-size: 11px;
      color: #8f8f8f;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .pickmain {
      font-size: 28px;
      font-weight: 900;
      margin-top: 6px;
    }
    .tiny { font-size: 12px; color: #999; margin-top: 6px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .mini {
      background: #171717;
      border: 1px solid #262626;
      border-radius: 14px;
      padding: 10px 8px;
      text-align: center;
    }
    .mini-label {
      font-size: 10px;
      color: #8d8d8d;
      text-transform: uppercase;
    }
    .mini-value {
      font-size: 13px;
      font-weight: 800;
      margin-top: 5px;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .actions .btn { flex: 1; }
    .leader-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      margin-bottom: 10px;
    }
    .rank {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #ffd166;
      border: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .leader-main { flex: 1; min-width: 0; }
    .leader-name { font-weight: 800; font-size: 16px; }
    .leader-sub { font-size: 12px; color: #9d9d9d; margin-top: 4px; }
    .trend-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 18px;
      padding: 14px;
    }
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .bar-wrap { margin-top: 10px; }
    .bar-head { display:flex; justify-content:space-between; font-size:12px; color:#9d9d9d; margin-bottom:4px; }
    .bar-bg { height: 8px; background:#1f1f1f; border-radius:999px; overflow:hidden; }
    .bar { height: 100%; border-radius:999px; background: linear-gradient(90deg, #f59e0b, #ffd166); }
    .slip-layout {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 14px;
    }
    .slip-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: #171717;
      border: 1px solid #282828;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .login {
      max-width: 460px;
      margin: 100px auto;
      padding: 24px;
      background: #111;
      border: 1px solid #222;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.32);
    }
    .login h1 { margin: 0 0 8px; }
    .login p { color: #999; margin: 0 0 16px; }
    .login input {
      width: 100%;
      padding: 14px;
      background: #101010;
      color: white;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      outline: none;
      margin-bottom: 12px;
    }
    .empty {
      padding: 28px;
      text-align: center;
      color: #9e9e9e;
      background: #121212;
      border: 1px dashed #2a2a2a;
      border-radius: 18px;
    }
    @media (max-width: 900px) {
      .cards, .trend-grid, .slip-layout { grid-template-columns: 1fr; }
      .grid4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .grid4 { grid-template-columns: 1fr 1fr; }
      .player { font-size: 18px; }
      .pickmain { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const SPORTS = [
      { id: "nba", label: "NBA", emoji: "🏀" },
      { id: "nfl", label: "NFL", emoji: "🏈" },
      { id: "mlb", label: "MLB", emoji: "⚾" },
      { id: "nhl", label: "NHL", emoji: "🏒" }
    ];

    const PICKS = {
      nba: [
        { player:"Nikola Jokic", team:"DEN", prop:"PRA", line:51.5, pick:"OVER", l5:4, l10:8, l25:19, h2h:3, h2hTotal:4, streak:3, matchup:"LAL @ DEN" },
        { player:"Jayson Tatum", team:"BOS", prop:"Points", line:28.5, pick:"OVER", l5:4, l10:7, l25:18, h2h:3, h2hTotal:4, streak:2, matchup:"MIA @ BOS" },
        { player:"Domantas Sabonis", team:"SAC", prop:"Rebounds", line:13.5, pick:"OVER", l5:5, l10:8, l25:21, h2h:3, h2hTotal:4, streak:5, matchup:"PHX @ SAC" },
        { player:"Luka Doncic", team:"LAL", prop:"Points", line:31.5, pick:"OVER", l5:4, l10:8, l25:18, h2h:2, h2hTotal:4, streak:2, matchup:"LAL @ DEN" }
      ],
      nfl: [
        { player:"Christian McCaffrey", team:"SF", prop:"Rush + Rec Yds", line:116.5, pick:"OVER", l5:4, l10:7, l25:17, h2h:2, h2hTotal:3, streak:2, matchup:"SF @ SEA" },
        { player:"Josh Allen", team:"BUF", prop:"Pass TDs", line:1.5, pick:"OVER", l5:3, l10:7, l25:18, h2h:2, h2hTotal:3, streak:1, matchup:"BUF @ MIA" },
        { player:"CeeDee Lamb", team:"DAL", prop:"Receiving Yds", line:86.5, pick:"OVER", l5:3, l10:6, l25:16, h2h:2, h2hTotal:4, streak:2, matchup:"DAL @ PHI" },
        { player:"Lamar Jackson", team:"BAL", prop:"Pass + Rush Yds", line:285.5, pick:"OVER", l5:4, l10:7, l25:18, h2h:2, h2hTotal:3, streak:3, matchup:"BAL @ CIN" }
      ],
      mlb: [
        { player:"Aaron Judge", team:"NYY", prop:"Hits + Runs + RBI", line:2.5, pick:"OVER", l5:4, l10:6, l25:15, h2h:3, h2hTotal:5, streak:2, matchup:"NYY @ BOS" },
        { player:"Mookie Betts", team:"LAD", prop:"Total Bases", line:1.5, pick:"OVER", l5:3, l10:6, l25:16, h2h:2, h2hTotal:4, streak:1, matchup:"LAD @ SD" },
        { player:"Spencer Strider", team:"ATL", prop:"Strikeouts", line:8.5, pick:"OVER", l5:4, l10:7, l25:18, h2h:3, h2hTotal:4, streak:3, matchup:"ATL @ NYM" },
        { player:"Juan Soto", team:"NYY", prop:"Walks", line:0.5, pick:"OVER", l5:4, l10:7, l25:17, h2h:3, h2hTotal:5, streak:3, matchup:"NYY @ BOS" }
      ],
      nhl: [
        { player:"Connor McDavid", team:"EDM", prop:"Points", line:1.5, pick:"OVER", l5:5, l10:8, l25:20, h2h:4, h2hTotal:5, streak:4, matchup:"EDM @ CGY" },
        { player:"Auston Matthews", team:"TOR", prop:"Shots on Goal", line:4.5, pick:"OVER", l5:4, l10:7, l25:18, h2h:3, h2hTotal:5, streak:2, matchup:"TOR @ MTL" },
        { player:"Nathan MacKinnon", team:"COL", prop:"Points", line:1.5, pick:"OVER", l5:4, l10:7, l25:17, h2h:3, h2hTotal:4, streak:3, matchup:"COL @ DAL" },
        { player:"David Pastrnak", team:"BOS", prop:"Shots on Goal", line:4.0, pick:"OVER", l5:4, l10:7, l25:18, h2h:3, h2hTotal:5, streak:1, matchup:"BOS @ NYR" }
      ]
    };

    function pct(made, total) {
      return Math.round((made / total) * 100);
    }

    function getConfidence(p) {
      const score =
        pct(p.l5, 5) * 0.22 +
        pct(p.l10, 10) * 0.24 +
        pct(p.l25, 25) * 0.24 +
        pct(p.h2h, p.h2hTotal) * 0.18 +
        Math.min(p.streak * 4, 20) * 0.12;
      return Math.max(58, Math.min(96, Math.round(score)));
    }

    function confClass(conf) {
      if (conf >= 76) return "conf high";
      if (conf >= 70) return "conf mid";
      return "conf";
    }

    function App() {
      const [name, setName] = React.useState("");
      const [loggedIn, setLoggedIn] = React.useState(false);
      const [sport, setSport] = React.useState("nba");
      const [tab, setTab] = React.useState("picks");
      const [search, setSearch] = React.useState("");
      const [slip, setSlip] = React.useState([]);

      const picks = React.useMemo(() => {
        return (PICKS[sport] || []).map(p => ({ ...p, conf: getConfidence(p) }));
      }, [sport]);

      const filtered = React.useMemo(() => {
        const q = search.trim().toLowerCase();
        const rows = [...picks].sort((a,b) => b.conf - a.conf);
        if (!q) return rows;
        return rows.filter(p =>
          [p.player, p.team, p.prop, p.matchup].some(v => String(v).toLowerCase().includes(q))
        );
      }, [picks, search]);

      const elite = filtered.filter(p => p.conf >= 76).length;
      const avg = filtered.length ? Math.round(filtered.reduce((a,b) => a + b.conf, 0) / filtered.length) : 0;

      function addToSlip(pick) {
        setSlip(prev => {
          const exists = prev.some(s => s.player === pick.player && s.prop === pick.prop && s.team === pick.team);
          if (exists) return prev;
          return [...prev, pick];
        });
      }

      function removeFromSlip(pick) {
        setSlip(prev => prev.filter(s => !(s.player === pick.player && s.prop === pick.prop && s.team === pick.team)));
      }

      if (!loggedIn) {
        return (
          <div className="app">
            <div className="login">
              <div className="logo" style={{marginBottom: 14}}>🏆</div>
              <h1>XPert Picks Pro</h1>
              <p>Clean single-file version. No installs. No Node. Just open it and upload it to GitHub.</p>
              <input
                value={name}
                onChange={e => setName(e.target.value)}
                placeholder="Enter a username"
              />
              <button className="btn gold" style={{width:'100%', padding:'14px'}} onClick={() => setLoggedIn(true)}>
                Enter App
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="app">
          <div className="topbar">
            <div className="brand">
              <div className="brand-left">
                <div className="logo">🏆</div>
                <div>
                  <div className="title">XPert Picks Pro</div>
                  <div className="sub">Welcome back, {name}. Multi-sport AI-style picks dashboard.</div>
                </div>
              </div>
              <div className="pill">Slip: {slip.length} legs</div>
            </div>
          </div>

          <div className="grid4">
            <div className="statbox"><div className="stat-num">{filtered.length}</div><div className="stat-label">Tracked Picks</div></div>
            <div className="statbox"><div className="stat-num">{elite}</div><div className="stat-label">Elite Edges</div></div>
            <div className="statbox"><div className="stat-num">{avg}%</div><div className="stat-label">Avg Confidence</div></div>
            <div className="statbox"><div className="stat-num">{slip.length}</div><div className="stat-label">Slip Legs</div></div>
          </div>

          <div className="controls">
            <div className="sports">
              {SPORTS.map(s => (
                <button
                  key={s.id}
                  className={"btn " + (sport === s.id ? "active" : "")}
                  onClick={() => setSport(s.id)}
                >
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>
            <input
              className="search"
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="Search player, team, prop, matchup"
            />
          </div>

          <div className="tabs" style={{marginBottom: 18}}>
            {[
              ["picks", "Picks"],
              ["leaderboard", "Leaderboard"],
              ["trends", "Trends"],
              ["slip", "Slip"]
            ].map(([id, label]) => (
              <button key={id} className={"btn " + (tab === id ? "active" : "")} onClick={() => setTab(id)}>{label}</button>
            ))}
          </div>

          {tab === "picks" && (
            <div className="cards">
              {filtered.map((pick, i) => {
                const inSlip = slip.some(s => s.player === pick.player && s.prop === pick.prop && s.team === pick.team);
                return (
                  <div className="card" key={i}>
                    <div className="row">
                      <div>
                        <div className="player">{pick.player}</div>
                        <div className="meta">{pick.team} · {pick.prop} · {pick.matchup}</div>
                      </div>
                      <div className={confClass(pick.conf)}>{pick.conf}%</div>
                    </div>

                    <div className="pickbox">
                      <div className="picklabel">AI Recommended Pick</div>
                      <div className="pickmain">{pick.pick} {pick.line}</div>
                      <div className="tiny">Streak: {pick.streak} straight</div>
                    </div>

                    <div className="stats">
                      <div className="mini"><div className="mini-label">L5</div><div className="mini-value">{pick.l5}/5 · {pct(pick.l5, 5)}%</div></div>
                      <div className="mini"><div className="mini-label">L10</div><div className="mini-value">{pick.l10}/10 · {pct(pick.l10, 10)}%</div></div>
                      <div className="mini"><div className="mini-label">L25</div><div className="mini-value">{pick.l25}/25 · {pct(pick.l25, 25)}%</div></div>
                      <div className="mini"><div className="mini-label">H2H</div><div className="mini-value">{pick.h2h}/{pick.h2hTotal} · {pct(pick.h2h, pick.h2hTotal)}%</div></div>
                    </div>

                    <div className="actions">
                      <button className="btn gold" onClick={() => addToSlip(pick)}>{inSlip ? "Added to Slip" : "Add to Slip"}</button>
                      <button className="btn">View Analysis</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {tab === "leaderboard" && (
            <div>
              {filtered.map((pick, i) => {
                const inSlip = slip.some(s => s.player === pick.player && s.prop === pick.prop && s.team === pick.team);
                return (
                  <div className="leader-row" key={i}>
                    <div className="rank">#{i + 1}</div>
                    <div className="leader-main">
                      <div className="leader-name">{pick.player}</div>
                      <div className="leader-sub">{pick.pick} {pick.line} {pick.prop} · {pick.team}</div>
                    </div>
                    <div className={confClass(pick.conf)}>{pick.conf}%</div>
                    <button className={"btn " + (inSlip ? "" : "gold")} onClick={() => addToSlip(pick)}>{inSlip ? "Added" : "Add"}</button>
                  </div>
                );
              })}
            </div>
          )}

          {tab === "trends" && (
            <div className="trend-grid">
              {filtered.map((pick, i) => (
                <div className="trend-card" key={i}>
                  <div className="player" style={{fontSize: 18}}>{pick.player}</div>
                  <div className="meta">{pick.prop} · {pick.team}</div>

                  <div className="bar-wrap">
                    <div className="bar-head"><span>Last 5</span><span>{pct(pick.l5, 5)}%</span></div>
                    <div className="bar-bg"><div className="bar" style={{width: pct(pick.l5, 5) + "%"}}></div></div>
                  </div>
                  <div className="bar-wrap">
                    <div className="bar-head"><span>Last 10</span><span>{pct(pick.l10, 10)}%</span></div>
                    <div className="bar-bg"><div className="bar" style={{width: pct(pick.l10, 10) + "%"}}></div></div>
                  </div>
                  <div className="bar-wrap">
                    <div className="bar-head"><span>Last 25</span><span>{pct(pick.l25, 25)}%</span></div>
                    <div className="bar-bg"><div className="bar" style={{width: pct(pick.l25, 25) + "%"}}></div></div>
                  </div>
                  <div className="bar-wrap">
                    <div className="bar-head"><span>Head to Head</span><span>{pct(pick.h2h, pick.h2hTotal)}%</span></div>
                    <div className="bar-bg"><div className="bar" style={{width: pct(pick.h2h, pick.h2hTotal) + "%"}}></div></div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab === "slip" && (
            <div className="slip-layout">
              <div className="card">
                <div className="player" style={{fontSize: 22, marginBottom: 12}}>Saved Bet Slip</div>
                {slip.length === 0 ? (
                  <div className="empty">No picks added yet. Go to Picks or Leaderboard and add some.</div>
                ) : (
                  slip.map((pick, i) => (
                    <div className="slip-item" key={i}>
                      <div>
                        <div style={{fontWeight:800}}>{pick.player}</div>
                        <div className="meta">{pick.pick} {pick.line} {pick.prop}</div>
                      </div>
                      <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                        <div className={confClass(pick.conf)}>{pick.conf}%</div>
                        <button className="btn" onClick={() => removeFromSlip(pick)}>Remove</button>
                      </div>
                    </div>
                  ))
                )}
              </div>

              <div className="card">
                <div className="player" style={{fontSize: 22, marginBottom: 12}}>Account</div>
                <div className="mini" style={{marginBottom: 10}}>
                  <div className="mini-label">User</div>
                  <div className="mini-value">{name}</div>
                </div>
                <div className="mini" style={{marginBottom: 10}}>
                  <div className="mini-label">Slip Legs</div>
                  <div className="mini-value">{slip.length}</div>
                </div>
                <div className="mini">
                  <div className="mini-label">Avg Slip Confidence</div>
                  <div className="mini-value">{slip.length ? Math.round(slip.reduce((a,b) => a + b.conf, 0) / slip.length) : 0}%</div>
                </div>
                <div className="tiny" style={{marginTop: 12}}>
                  This HTML version is the easy-launch edition. It works with GitHub Pages without Node.
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
